version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: docker-manage-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: docker-manage-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
