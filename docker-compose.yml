version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: docker-manage-backend
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:-docker-manage-token}
    expose:
      - "8080"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: docker-manage-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
